<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - NotesPortal</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            position: relative;
            z-index: 2;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
        }

        .auth-form {
            display: none;
            animation: fadeInUp 0.4s ease-out;
        }

        .auth-form.active {
            display: block;
        }

        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
    </style>
</head>

<body>
    <div class="bg-shapes">
        <div class="decor-1"
            style="left: -100px; top: -100px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2)); width: 500px; height: 500px;">
        </div>
        <div class="decor-2"
            style="right: -100px; bottom: -100px; background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(52, 211, 153, 0.2)); width: 400px; height: 400px;">
        </div>
    </div>

    <div class="auth-container">
        <a href="index.html" style="position: absolute; top: 2rem; left: 2rem; font-weight: bold; color: white;">&larr;
            Back to Home</a>

        <div class="glass-effect auth-card">
            <h2
                style="text-align: center; margin-bottom: 2rem; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                NotesPortal</h2>

            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login">Login</div>
                <div class="auth-tab" id="tab-register">Register</div>
            </div>

            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="login-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="login-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="reg-username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="reg-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="reg-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-secondary" style="width: 100%;">Register</button>
            </form>
            <div id="auth-error" style="color: #ef4444; margin-top: 1rem; text-align: center; font-size: 0.875rem;">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const formLogin = document.getElementById('login-form');
        const formRegister = document.getElementById('register-form');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            formLogin.classList.add('active');
            formRegister.classList.remove('active');
            document.getElementById('auth-error').innerText = '';
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            formRegister.classList.add('active');
            formLogin.classList.remove('active');
            document.getElementById('auth-error').innerText = '';
        });

        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            await loginUser(document.getElementById('login-email').value, document.getElementById('login-password').value);
        });

        formRegister.addEventListener('submit', async (e) => {
            e.preventDefault();
            await registerUser(
                document.getElementById('reg-username').value,
                document.getElementById('reg-email').value,
                document.getElementById('reg-password').value
            );
        });
    </script>
</body>

</html>
